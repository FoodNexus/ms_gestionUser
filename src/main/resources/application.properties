# Configuration du port du serveur (optionnel, mais utile en microservices pour ne pas avoir de conflits)
server.port=8087
spring.application.name=ms-gestionUser
spring.datasource.url=jdbc:mysql://localhost:3306/foodnexus_user?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
### JPA / HIBERNATE ###
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
### EUREKA CONFIGURATION ###
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true