# Configuration du port du serveur
server.port=8087
spring.application.name=ms-gestionUser
spring.datasource.url=jdbc:mysql://localhost:3306/foodnexus_user?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
### JPA / HIBERNATE ###
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
### EUREKA CONFIGURATION ###
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
### KEYCLOAK / OAUTH2 RESOURCE SERVER ###
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/foodnexus
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/foodnexus/protocol/openid-connect/certs

### KEYCLOAK ADMIN CONFIG ###
keycloak.admin.server-url=http://localhost:8180
keycloak.admin.realm=foodnexus
keycloak.admin.client-id=foodnexus-app
keycloak.admin.client-secret=l9ea6k7SmatXfY2FObT1c0rNkojey9JL